  <title>Dmitri Shchukin | Portfolio</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
    }

    .header {
      background: #fff;
      color: #000;
      padding: 70px 12%;
    }

    .header h1 {
      margin: 0 0 10px 0;
      font-size: 32px;
      font-weight: 500;
    }

    .header p {
      margin: 6px 0;
      font-size: 22px;
    }

    .projects {
      background: #000;
      padding: 80px 7%;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 80px 120px;
    }

    .card {
      border: 3px solid #fff;
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-decoration: none;
      font-size: 26px;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 90px;
      height: 2px;
      background: linear-gradient(90deg, #74c7ff, #ff6b6b);
      top: 35%;
      left: 20%;
    }

    .card:hover {
      background: #111;
    }

    @media (max-width: 800px) {
      .projects {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .card {
        height: 180px;
      }
    }
  </style>
</head>
